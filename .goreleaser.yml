version: 2

project_name: terraform-provider-netgear-plus

before:
  hooks:
    - go mod tidy

builds:
  - id: provider
    main: .
    binary: terraform-provider-netgear-plus
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: provider
    ids:
      - provider
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: lucavb
    name: terraform-provider-netgear-plus
